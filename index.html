<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="log/log.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="card-brand-label">VELODRIVE</div>
    
            <header class="header-area">
                <span class="tag">AUTHENTICATION</span>
                <h1>LOGIN <span>NOW</span></h1>
                <p class="welcome-text">DRIVE YOUR AMBITION. START YOUR JOURNEY.</p>
            </header>
    
            <form action="index-2.html">
                <div class="form-group">
                    <input type="text" placeholder="USERNAME" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="EMAIL ADDRESS" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="PASSWORD" required>
                </div>
                
                <button type="submit" class="login-btn">START ENGINE</button>
            </form>
    
            <div class="footer-links">
                <a href="#">Forgot Key?</a>
                <a href="#">Create Account</a>
            </div>
        </div>
    </div>
</body>
</html>
